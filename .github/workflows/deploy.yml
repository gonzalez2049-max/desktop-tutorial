name: Desplegar a GitHub Pages

# Construye la app con Vite y la publica en GitHub Pages en cada push a main.
on:
  push:
    branches: [main]
  workflow_dispatch: {} # permite ejecutarlo manualmente desde la pestaña Actions

# Permisos que necesita el despliegue a Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Evita despliegues solapados; no cancela uno en curso.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Construir (npm run build)
        run: npm run build

      - name: Configurar Pages
        uses: actions/configure-pages@v5
        with:
          # Activa GitHub Pages automáticamente si el repo es elegible
          # (público, o privado con plan de pago). Evita el paso manual en Settings.
          enablement: true

      - name: Subir artefacto (dist)
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
